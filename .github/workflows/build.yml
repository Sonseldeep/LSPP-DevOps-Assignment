name: Build & Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-job:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DevOPs.sln

      - name: Build
        run: dotnet build DevOPs.sln -c Release --no-restore

      - name: Test
        run: dotnet test DevOPs.sln -c Release --no-build --collect:"XPlat Code Coverage" --verbosity normal

  build-job:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test-job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f DevOPs_Assignment/Dockerfile -t devops-assignment:ci .

