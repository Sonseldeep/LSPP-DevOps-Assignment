name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-scan-push:
    name: Build, Scan, Push Image
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: devops-assignment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: names
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          TAG=${GITHUB_REF_NAME}
          echo "name=ghcr.io/${OWNER_LOWER}/${IMAGE_REPO}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build image (local)
        run: |
          docker build -f DevOPs_Assignment/Dockerfile -t ${{ steps.names.outputs.name }}:${{ steps.names.outputs.tag }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.names.outputs.name }}:${{ steps.names.outputs.tag }}
          format: 'table'
          vuln-type: 'os,library'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push to GHCR
        run: |
          docker push ${{ steps.names.outputs.name }}:${{ steps.names.outputs.tag }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

